name: my_tiny_thinker
description: "TinyThink - A colorful educational app for children aged 1-10."
publish_to: 'none'
version: 1.0.1+2

environment:
  sdk: ^3.11.3

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter

  cupertino_icons: ^1.0.8
  flutter_riverpod: ^2.6.1
  riverpod_annotation: ^2.6.1
  go_router: ^14.8.1
  google_fonts: ^6.2.1
  audioplayers: ^6.4.0
  shared_preferences: ^2.5.3
  equatable: ^2.0.7
  intl: ^0.20.2
  simple_gradient_text: ^1.3.0
  flutter_svg: ^2.0.17

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  riverpod_generator: ^2.6.5
  build_runner: ^2.4.15
  custom_lint: ^0.7.5
  riverpod_lint: ^2.6.5
  flutter_launcher_icons: ^0.14.4

# path_provider_foundation 2.6.0 uses FFI via package:objective_c, which fails to
# load on iOS simulators (objective_c.framework not embedded). 2.5.1 uses the
# stable method-channel implementation instead.
dependency_overrides:
  path_provider_foundation: 2.5.1

flutter_launcher_icons:
  android: true
  ios: true
  image_path: assets/images/app_icon.png
  remove_alpha_ios: true
  adaptive_icon_background: "#4FC3F7"
  adaptive_icon_foreground: assets/images/app_icon.png
  min_sdk_android: 21

flutter:
  uses-material-design: true
  generate: true

  assets:
    - assets/audio/
    - assets/audio/animals/
    - assets/images/
    - assets/animations/
