name: my_tiny_thinker
description: "TinyThink - A colorful educational app for children aged 3-10."
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.11.3

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter

  cupertino_icons: ^1.0.8
  flutter_riverpod: ^2.6.1
  riverpod_annotation: ^2.6.1
  go_router: ^14.8.1
  google_fonts: ^6.2.1
  audioplayers: ^6.4.0
  shared_preferences: ^2.5.3
  equatable: ^2.0.7
  intl: ^0.20.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  riverpod_generator: ^2.6.5
  build_runner: ^2.4.15
  custom_lint: ^0.7.5
  riverpod_lint: ^2.6.5

# path_provider_foundation 2.6.0 uses FFI via package:objective_c, which fails to
# load on iOS simulators (objective_c.framework not embedded). 2.5.1 uses the
# stable method-channel implementation instead.
dependency_overrides:
  path_provider_foundation: 2.5.1

flutter:
  uses-material-design: true
  generate: true

  assets:
    - assets/audio/
    - assets/images/
    - assets/animations/
